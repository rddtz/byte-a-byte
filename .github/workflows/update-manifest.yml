name: Update posts manifest

on:
  push:
    branches: [main]
    paths:
      - 'site/posts/*.md'

jobs:
  generate-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate manifest
        run: python3 site/scripts/generate_manifest.py

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/posts/manifest.json
          git diff --staged --quiet || git commit -m "chore: update posts manifest"
          git push
