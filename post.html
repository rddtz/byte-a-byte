<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Byte a Byte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #FFD600;
      --charcoal: #3A3A3A;
      --charcoal-light: #666;
      --paper: #F5F0E4;
      --paper-dark: #EDE7D6;
      --black: #1A1A1A;
      --white: #FAFAF7;
      --pixel: 'Press Start 2P', monospace;
      --mono: 'Space Mono', monospace;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--mono); background: var(--paper); color: var(--charcoal); overflow-x: hidden; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--charcoal); padding: 0 2rem; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo a { font-family: var(--pixel); font-size: 10px; color: var(--yellow); text-decoration: none; letter-spacing: 0.05em; }
    .nav-logo a:hover { color: var(--white); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-family: var(--pixel); font-size: 8px; color: var(--yellow); text-decoration: none; }
    .nav-links a:hover, .nav-links a.active { color: var(--white); }
    .nav-cta {
      font-family: var(--pixel); font-size: 8px;
      background: var(--yellow); color: var(--charcoal);
      border: none; padding: 8px 16px; cursor: pointer; text-decoration: none;
    }
    .nav-cta:hover { background: var(--white); }
    /* ── HAMBURGER ── */
    .nav-burger {
      display: none; flex-direction: column; justify-content: center;
      gap: 5px; background: none; border: none; cursor: pointer; padding: 6px;
    }
    .nav-burger span { display: block; width: 22px; height: 3px; background: var(--yellow); transition: transform 0.15s, opacity 0.15s; }
    .nav-burger.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .nav-burger.open span:nth-child(2) { opacity: 0; }
    .nav-burger.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
    .nav-mobile {
      display: none; position: fixed; top: 56px; left: 0; right: 0;
      z-index: 99; background: var(--charcoal); border-top: 3px solid var(--yellow);
      padding: 1rem 2rem 1.5rem;
    }
    .nav-mobile.open { display: block; }
    .nav-mobile ul { list-style: none; }
    .nav-mobile li { border-bottom: 1px solid #555; }
    .nav-mobile a { font-family: var(--pixel); font-size: 9px; color: var(--yellow); text-decoration: none; display: block; padding: 1.1rem 0; letter-spacing: 0.05em; }
    .nav-mobile a:hover, .nav-mobile a.active { color: var(--white); }
    .nav-mobile .mobile-cta { margin-top: 1.2rem; display: inline-block; font-family: var(--pixel); font-size: 9px; background: var(--yellow); color: var(--charcoal); padding: 10px 20px; text-decoration: none; }
    .nav-mobile .mobile-cta:hover { background: var(--white); }
    @media (max-width: 600px) { .nav-links { display: none; } .nav-cta { display: none; } .nav-burger { display: flex; } }

    /* ── HEADER ── */
    .post-header {
      padding-top: 56px;
      background: var(--charcoal);
    }
    .post-header-inner {
      max-width: 760px; margin: 0 auto; padding: 4rem 2rem 3rem;
    }
    .post-back {
      font-family: var(--pixel); font-size: 8px;
      color: var(--yellow); text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
      margin-bottom: 2rem;
    }
    .post-back:hover { color: var(--white); }

    .post-tag {
      font-family: var(--pixel); font-size: 7px;
      background: var(--yellow); color: var(--charcoal);
      padding: 4px 10px; display: inline-block;
      letter-spacing: 0.1em; margin-bottom: 1.5rem;
    }
    .post-tag.tag-02 { background: var(--charcoal); color: var(--yellow); border: 2px solid var(--yellow); }
    .post-tag.tag-03 { background: #555; color: var(--white); }
    .post-tag.tag-dica { background: transparent; color: var(--yellow); border: 2px solid var(--yellow); }

    .post-title {
      font-family: var(--pixel); font-size: clamp(12px, 2vw, 18px);
      color: var(--white); line-height: 1.9; margin-bottom: 1.5rem;
    }
    .post-meta {
      font-size: 12px; color: #888;
      display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
    }
    .meta-dot { width: 4px; height: 4px; background: var(--yellow); display: inline-block; }

    /* torn */
    .torn { width: 100%; overflow: hidden; line-height: 0; }
    .torn svg { display: block; width: 100%; }

    /* ── ARTICLE ── */
    .post-body {
      background-color: var(--paper);
      background-image: repeating-linear-gradient(transparent, transparent 31px, #C5BBA855 31px, #C5BBA855 32px);
      padding: 4rem 2rem 6rem;
    }
    .post-body-inner {
      max-width: 720px; margin: 0 auto;
    }

    /* ── MARKDOWN CONTENT ── */
    .post-content h1 { display: none; }

    .post-content h2 {
      font-family: var(--pixel); font-size: 14px;
      line-height: 1.9; margin: 3.5rem 0 1.4rem;
      color: var(--charcoal);
      border-left: 5px solid var(--yellow);
      padding-left: 1rem;
    }
    .post-content h3 {
      font-family: var(--mono); font-weight: 700; font-size: 17px;
      line-height: 1.8; margin: 2.5rem 0 1rem; color: var(--charcoal);
    }
    .post-content h3::before {
      content: '// '; color: var(--yellow); font-weight: 400;
    }
    .post-content p {
      font-family: var(--mono); font-size: 15px; line-height: 2;
      margin-bottom: 1.5rem; color: var(--charcoal);
    }
    .post-content strong { color: var(--black); font-weight: 700; }
    .post-content em { font-style: italic; color: var(--charcoal-light); }

    .post-content code {
      font-family: var(--mono); font-size: 13px;
      background: var(--black); color: #CE9178;
      padding: 2px 7px;
    }
    .post-content pre {
      margin: 2rem 0;
      border: 3px solid var(--charcoal);
      box-shadow: 6px 6px 0 var(--charcoal);
      overflow-x: auto;
    }
    .post-content pre code {
      display: block; padding: 1.5rem;
      background: var(--black); color: #D4D4D4;
      font-size: 13px; line-height: 2;
    }

    /* ── HIGHLIGHT.JS CUSTOM THEME ── */
    .hljs { background: var(--black); color: #D4D4D4; }
    .hljs-keyword, .hljs-selector-tag { color: #569CD6; }
    .hljs-string, .hljs-attr { color: #CE9178; }
    .hljs-number, .hljs-literal { color: #85E89D; }
    .hljs-comment { color: #888; font-style: italic; }
    .hljs-built_in, .hljs-title.function_ { color: #DCDCAA; }
    .hljs-variable, .hljs-params { color: #D4D4D4; }
    .hljs-doctag, .hljs-meta { color: #7ECA9C; }
    .hljs-title { color: #DCDCAA; }
    .hljs-name { color: #79C0FF; }

    .post-content ul, .post-content ol {
      margin: 1rem 0 1.5rem 1.5rem;
    }
    .post-content li {
      font-family: var(--mono); font-size: 14px;
      line-height: 2; margin-bottom: 0.5rem;
    }
    .post-content li::marker { color: var(--yellow); font-weight: 700; }
    .post-content li code { font-size: 12px; }

    .post-content blockquote {
      border-left: 5px solid var(--yellow);
      padding: 1rem 1.5rem;
      margin: 2rem 0;
      background: var(--paper-dark);
      box-shadow: 4px 4px 0 var(--yellow);
    }
    .post-content blockquote p {
      color: var(--charcoal); margin-bottom: 0; font-size: 14px; font-style: italic;
    }

    .post-content hr {
      border: none; border-top: 3px solid var(--charcoal);
      margin: 3rem 0;
    }

    .post-content table {
      width: 100%; border-collapse: collapse;
      margin: 2rem 0;
      border: 3px solid var(--charcoal);
      box-shadow: 5px 5px 0 var(--charcoal);
    }
    .post-content th {
      font-family: var(--pixel); font-size: 8px;
      background: var(--charcoal); color: var(--yellow);
      padding: 12px 14px; text-align: left;
    }
    .post-content td {
      font-family: var(--mono); font-size: 13px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--paper-dark);
    }
    .post-content tr:last-child td { border-bottom: none; }
    .post-content tr:nth-child(even) td { background: var(--paper-dark); }

    /* ── ERROR / LOADING ── */
    .state-msg {
      font-family: var(--pixel); font-size: 10px; line-height: 2;
      color: var(--charcoal-light); text-align: center;
      padding: 4rem 2rem;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--black); padding: 3rem 2rem;
      font-family: var(--mono); font-size: 13px; color: #555;
    }
    .footer-inner {
      max-width: 760px; margin: 0 auto;
      display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: 2rem;
    }
    .footer-logo { display: flex; flex-direction: column; gap: 0.5rem; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">
      <a href="index.html">Byte a Byte</a>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#sobre">Sobre</a></li>
      <li><a href="index.html#conteudo">Aulas</a></li>
      <li><a href="blog.html" class="active">Blog</a></li>
    </ul>
    <a class="nav-cta" href="https://forms.gle/xpRqiLXWWwzMHL2f8">Inscreva-se</a>
    <button class="nav-burger" id="nav-burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="nav-mobile" id="nav-mobile">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#sobre">Sobre</a></li>
      <li><a href="index.html#conteudo">Aulas</a></li>
      <li><a href="blog.html" class="active">Blog</a></li>
    </ul>
    <a class="mobile-cta" href="https://forms.gle/xpRqiLXWWwzMHL2f8">Inscreva-se</a>
  </div>

  <div class="post-header">
    <div class="post-header-inner">
      <a class="post-back" href="blog.html">← Voltar ao blog</a>
      <div id="post-tag-el"></div>
      <h1 class="post-title" id="post-title-el">Carregando...</h1>
      <div class="post-meta" id="post-meta-el"></div>
    </div>
    <div class="torn">
      <svg viewBox="0 0 1200 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,0 L0,40 Q30,55 60,38 Q90,22 130,50 Q160,64 200,40 Q240,20 280,50 Q310,65 350,40 Q390,18 430,52 Q460,65 510,38 Q550,16 590,48 Q620,63 660,36 Q700,14 740,50 Q770,63 820,35 Q860,12 900,48 Q930,62 970,38 Q1010,16 1050,50 Q1080,63 1120,40 Q1150,20 1200,46 L1200,0 Z" fill="var(--paper)"/>
      </svg>
    </div>
  </div>

  <div class="post-body">
    <div class="post-body-inner">
      <div class="post-content" id="post-content">
        <p class="state-msg">Carregando post...</p>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-logo">
        <span style="font-family: var(--pixel); font-size: 10px; color: #aaa;">Byte a Byte</span>
        <span style="font-size: 12px;">Instituto de Informática · UFRGS</span>
      </div>
      <div style="text-align: right; line-height: 2;">
        <div><a href="blog.html" style="color: var(--yellow); text-decoration: none;">← Voltar ao blog</a></div>
        <div style="font-size: 11px; color: #444;">© 2025 · Byte a Byte</div>
      </div>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/c.min.js"></script>
  <script>
    const TAG_CONFIG = {
      aula01: { label: 'AULA 01', cls: '' },
      aula02: { label: 'AULA 02', cls: 'tag-02' },
      aula03: { label: 'AULA 03', cls: 'tag-03' },
      dica:   { label: 'DICA',    cls: 'tag-dica' },
    };

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(d) {
      if (!d) return '';
      const [y, m, day] = d.split('-').map(Number);
      const months = ['jan.','fev.','mar.','abr.','mai.','jun.','jul.','ago.','set.','out.','nov.','dez.'];
      return `${day} ${months[m - 1]} ${y}`;
    }

    function stripFrontmatter(text) {
      if (!text.startsWith('---')) return text;
      const end = text.indexOf('---', 3);
      return end === -1 ? text : text.slice(end + 3).trim();
    }

    marked.setOptions({
      highlight: null,
      gfm: true,
      breaks: false,
    });

    const renderer = new marked.Renderer();
    renderer.code = (code, lang) => {
      const language = hljs.getLanguage(lang) ? lang : 'plaintext';
      const highlighted = hljs.highlight(typeof code === 'object' ? code.text : code, { language }).value;
      return `<pre><code class="hljs language-${esc(language)}">${highlighted}</code></pre>`;
    };
    marked.use({ renderer });

    async function loadPost() {
      const slug = new URLSearchParams(location.search).get('slug');
      if (!slug) { location.href = 'blog.html'; return; }

      try {
        const [manifestRes, mdRes] = await Promise.all([
          fetch('posts/manifest.json'),
          fetch(`posts/${encodeURIComponent(slug)}.md`),
        ]);

        if (!mdRes.ok) throw new Error('Post não encontrado.');

        const manifest = await manifestRes.json();
        const raw = await mdRes.text();
        const post = manifest.find(p => p.slug === slug) || {};
        const tag = TAG_CONFIG[post.tag] || { label: (post.tag || '').toUpperCase(), cls: '' };

        document.title = `${post.title || slug} — Byte a Byte`;

        document.getElementById('post-tag-el').innerHTML =
          `<span class="post-tag ${esc(tag.cls)}">${esc(tag.label)}</span>`;

        document.getElementById('post-title-el').textContent = post.title || slug;

        document.getElementById('post-meta-el').innerHTML =
          `<span>${post.reading_time || '?'} min de leitura</span>
           <span class="meta-dot"></span>
           <span>${formatDate(post.date)}</span>
           <span class="meta-dot"></span>
           <span>Byte a Byte</span>`;

        const content = stripFrontmatter(raw);
        document.getElementById('post-content').innerHTML = marked.parse(content);
      } catch (err) {
        document.getElementById('post-content').innerHTML =
          `<p class="state-msg">Post não encontrado.<br><a href="blog.html" style="color:var(--yellow)">← Voltar ao blog</a></p>`;
      }
    }

    loadPost();
  </script>
  <script>
    (function () {
      var burger = document.getElementById('nav-burger');
      var menu = document.getElementById('nav-mobile');
      burger.addEventListener('click', function () {
        burger.classList.toggle('open');
        menu.classList.toggle('open');
      });
      menu.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () {
          burger.classList.remove('open');
          menu.classList.remove('open');
        });
      });
    })();
  </script>
</body>
</html>
